<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<body class="font-inter">
    <!-- Dynamic Section -->
  <!-- Categories -->
    <section>
        <h2 class="text-center font-semibold text-[32px]">Choose Your Trees</h2>

        <div class="grid grid-cols-4 w-11/12 mx-auto text-center mt-10">
            <div class="col-span-1 sticky top-1 self-start">
                <p class="font-semibold text-[20px] mb-6">Category</p>
                <div id="cat-btn">
                    <button onclick="loadAllPlant()" id="all-tree-btn" class="btn btn-success w-full mb-3 justify-start">All Trees</button>
                </div>
            </div>

            <!-- Plant Section -->
            <div class="col-span-2 mt-10">
              <div id = "plant-div" class="grid grid-cols-3 gap-4">
                
               
              </div>
            </div> 
            <!-- cart -->
            <div class="col-span-1"> 
                  <p class="font-semibold text-[20px] mb-6">Your Cart</p>
                  <div id = "cart-div">
                       
                  </div>
                  <div id = "cart-total" class="flex justify-between">
                    
                  </div>
            </div>
        </div>
    </section>
   <section>
    <!-- <button class="btn" onclick="myModal.showModal()">open modal</button> -->
<dialog id="myModal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
    <form method="dialog">
      <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
    </form>
    <div id="detailContainer">

               </div>
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>
   </section>
    <script src="./earth.js"></script>
